name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
        env:
          POSTGRES_DB: starter_test
          POSTGRES_USER: starter
          POSTGRES_PASSWORD: starter
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U starter -d starter_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DJANGO_SETTINGS_MODULE: DjangoApiStarter.settings.ci
      POSTGRES_DB: starter_test
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
      POSTGRES_HOST: 127.0.0.1
      REDIS_URL: redis://127.0.0.1:6379/1
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv sync --frozen
      - name: Start SMTP and S3-compatible test providers
        run: |
          docker run --detach --rm --name starter-minio -p 9000:9000 -e MINIO_ROOT_USER=starter-access -e MINIO_ROOT_PASSWORD=starter-secret minio/minio:latest@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e server /data
          docker run --detach --rm --name starter-mailpit -p 1025:1025 -p 8025:8025 axllent/mailpit:latest@sha256:5a49a77c5bdbe7c5474450b4f46348d09949df3695257729c93a30369382d4f6
          uv run python -m scripts.provider_smoke
      - name: Apply migrations twice
        run: uv run python manage.py migrate --noinput && uv run python manage.py migrate --noinput
      - run: uv run python manage.py makemigrations --check --dry-run
      - run: uv run pytest -q
      - run: uv run mypy .
      - run: uv run black --check .
      - name: Lint for invalid syntax and undefined names
        run: uv run flake8 --select=E9,F63,F7,F82 --exclude=.venv,migrations .
      - run: uv run python manage.py check --database default
      - name: Verify OpenAPI contract
        run: uv run python scripts/export_openapi.py > /tmp/openapi.json && diff -u docs/openapi.json /tmp/openapi.json
      - name: Audit Python dependencies
        run: uv run pip-audit
      - name: Scan repository for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
      - name: Production system checks
        env:
          SECRET_KEY: production-check-secret-key-with-more-than-fifty-random-characters-123
          JWT_SIGNING_KEY: independent-production-check-jwt-key-with-more-than-fifty-characters-456
          DJANGO_ALLOWED_HOSTS: api.example.com
          FRONTEND_URL: https://app.example.com
          CORS_ALLOWED_ORIGINS: https://app.example.com
          POSTGRES_HOST: 127.0.0.1
          EMAIL_HOST: smtp.example.com
          EMAIL_HOST_USER: test
          EMAIL_HOST_PASSWORD: test
          DEFAULT_FROM_EMAIL: noreply@example.com
          R2_ACCESS_KEY_ID: test
          R2_SECRET_ACCESS_KEY: test
          R2_ENDPOINT_URL: https://storage.example.com
          R2_PRIVATE_BUCKET_NAME: private
          R2_PUBLIC_BUCKET_NAME: public
          IMAGE_PUBLIC_BASE_URL: https://media.example.com
        run: uv run python manage.py check --deploy --database default --settings=DjangoApiStarter.settings.production
      - name: Build production image
        run: docker build --tag starter-ci:${{ github.sha }} .
      - name: Scan production image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: starter-ci:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Container smoke test
        run: |
          docker run --detach --rm --name starter-smoke -p 8000:8000 -e DJANGO_SETTINGS_MODULE=DjangoApiStarter.settings.test starter-ci:${{ github.sha }}
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8000/health/live/ && exit 0
            sleep 1
          done
          docker logs starter-smoke
          exit 1
