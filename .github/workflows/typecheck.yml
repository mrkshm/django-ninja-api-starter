name: Typecheck

on:
  pull_request:
  push:
    branches: [main]

jobs:
  mypy:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: typecheck-secret
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: DjangoApiStarter.settings
      R2_ACCESS_KEY_ID: test
      R2_SECRET_ACCESS_KEY: test
      R2_BUCKET_NAME: test-private
      R2_PRIVATE_BUCKET_NAME: test-private
      R2_PUBLIC_BUCKET_NAME: test-public
      R2_ENDPOINT_URL: http://localhost
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev gdal-bin libgdal-dev
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Run mypy
        run: python -m mypy --config-file mypy.ini

